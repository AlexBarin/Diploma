global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: metric-lab-app
    metrics_path: /metrics
    static_configs:
      - targets: ["metric-lab-app:8000"]

  - job_name: metric-lab-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["metric-lab-worker:9108"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: metric-lab-host
    metrics_path: /metrics
    static_configs:
      - targets: ["host-exporter-linux:9422"]

  - job_name: 'adaptive-threshold-engine'
    honor_labels: true
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['adaptive-threshold-engine:8080']
    scrape_interval: 15s
