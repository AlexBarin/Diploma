networks:
  metric_lab:
    external: true
    name: metric-lab_metric_lab

services:
  adaptive-threshold-engine:
    build:
      context: ./adaptive-threshold-engine
    container_name: adaptive-threshold-engine
    ports:
      - "8080:8080"
    environment:
      - THRESHOLD_ENGINE_PROMETHEUS_URL=http://prometheus:9090
      - THRESHOLD_ENGINE_GRAFANA_URL=http://grafana:3000
      - DB_HOST=postgres
      - DB_NAME=metriclab
      - DB_USER=lab
      - DB_PASS=lab
    networks:
      - metric_lab
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
